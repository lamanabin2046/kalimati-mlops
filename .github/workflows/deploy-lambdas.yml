name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1
      
      - name: Deploy Drift Detector
        run: |
          cd lambdas/drift-detector
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name drift-detection --zip-file fileb://function.zip
      
      - name: Deploy Weather Ingestion
        run: |
          cd lambdas/weather-ingestion
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name weather-ingestion --zip-file fileb://function.zip
      
      - name: Deploy NOC Diesel Scraper
        run: |
          cd lambdas/noc-diesel-scraper
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name noc-diesel-scraper --zip-file fileb://function.zip
      
      - name: Deploy News Event Ingestion
        run: |
          cd lambdas/news-event-ingestion
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name news-event-ingestion --zip-file fileb://function.zip
      
      - name: Deploy NRB Inflation Check
        run: |
          cd lambdas/nrb-inflation-check
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name nrb-inflation-check --zip-file fileb://function.zip
      
      - name: Deploy Build Event Features
        run: |
          cd lambdas/build-event-features
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name build-event-features --zip-file fileb://function.zip
      
      - name: Deploy Build Dataset
        run: |
          cd lambdas/build-dataset
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name build-dataset --zip-file fileb://function.zip
      
      - name: Deploy Run Training
        run: |
          cd lambdas/run-training
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name run-training --zip-file fileb://function.zip
      
      - name: Deploy Reload Model
        run: |
          cd lambdas/reload-model
          zip -r function.zip lambda_function.py
          aws lambda update-function-code --function-name reload-model --zip-file fileb://function.zip