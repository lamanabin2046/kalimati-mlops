name: Deploy Web App to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/deploy-webapp.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug folder structure
        run: |
          pwd
          ls -R

      - name: Deploy Frontend Build to EC2
        uses: appleboy/scp-action@master
        with:
          host: 52.201.197.75
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app/build/*"
          target: "/home/ubuntu/app-deploy/"
          strip_components: 2

      - name: Update Nginx and Restart Services
        uses: appleboy/ssh-action@master
        with:
          host: 52.201.197.75
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/html
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/app-deploy/* /var/www/html/
            sudo systemctl reload nginx
            echo "✅ Frontend deployed!"

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy Backend to EC2
        uses: appleboy/scp-action@master
        with:
          host: 52.201.197.75
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app/backend/main.py"
          target: "/home/ubuntu/app/backend/"
          strip_components: 2

      - name: Restart FastAPI Service
        uses: appleboy/ssh-action@master
        with:
          host: 52.201.197.75
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart kalimati-api
            sudo systemctl status kalimati-api --no-pager
            echo "✅ Backend restarted!"